server:
  port: 8000

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/blog_user?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Security配置
  security:
    user:
      name: admin
      password: admin
  # Redis配置
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.blog.user.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Eureka配置
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true
    instance-id: ${spring.cloud.client.ip-address}:${server.port}

# JWT配置
jwt:
  secret: spring-cloud-blog-jwt-secret-key-2024-spring-cloud-blog-jwt-secret-key-2024-spring-cloud-blog-jwt-secret-key-2024
  expiration: 86400  # 令牌过期时间(秒)，24小时

# 启用所有监控端点
management:
  endpoints:
    web:
      exposure:
        include: '*'
