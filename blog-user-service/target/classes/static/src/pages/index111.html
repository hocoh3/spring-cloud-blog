<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <title>商城首页</title>
<style>
    header a{
        text-decoration: none;
        color: #666;
    }
</style>
</head>
<body>
<div id="app">
    <el-container>
        <el-header >
            <div style="width: 1200px;margin: 0 auto;">
                <img src="imgs/logo.png" style="width: 300px;vertical-align: middle">
                <span>
                <a href="#">首页</a>
                <el-divider direction="vertical"></el-divider>
                <a href="#">热点资讯</a>
                <el-divider direction="vertical"></el-divider>
                <a href="#">商家入驻</a>
                <el-divider direction="vertical"></el-divider>
                <a href="#">社会招聘</a>
                <el-divider direction="vertical"></el-divider>
                <a href="#">校园招聘</a>
                <el-divider direction="vertical"></el-divider>
                <a href="#">帮助</a>
                </span>
            </div>
            <div style="background-color: #66ccff">
                <el-menu style="width: 1200px;margin: 0 auto;"
                        mode="horizontal"
                        background-color="#66ccff"
                        text-color="#fff"
                        active-text-color="#fff">
                    <el-menu-item index="1+i" v-for="t in categoryArr">{{t.name}}</el-menu-item>
                    <div style="float: right;margin-top: 10px">
                        <el-input placeholder="请输入内容" v-model="input">
                            <el-button slot="append" icon="el-icon-search">
                            </el-button>
                        </el-input>
                    </div>
                </el-menu>
            </div>
        </el-header>
        <el-main style="width: 1200px;margin: 0 auto; margin-top: 100px">
            <el-row :gutter="20">
                <el-col :span="18">
                    <el-carousel height="300px">
                        <el-carousel-item v-for="item in bannerArr">
                            <img :src="item.url" width="100%" height="100%">
                        </el-carousel-item>
                    </el-carousel>
                </el-col>

                <el-col :span="6">
                    <el-card height="300px">
                        <h3><i class="el-icon-trophy" style="font-weight: bold"></i>限量最高</h3>
                        <el-divider></el-divider>
                        <el-table :data="topArr" class="table">
                            <el-table-column
                                    cell-style="padding: 0"
                                    type="index"
                                    label="排名"
                                    width="50">
                            </el-table-column>
                            <el-table-column
                                    cell-style="padding: 0"
                                    prop="title"
                                    label="商品名"
                                    width="80">
                            </el-table-column>
                            <el-table-column
                                    cell-style="padding: 0"
                                    prop="saleCount"
                                    label="销量"
                                    width="80">
                            </el-table-column>
                        </el-table>
                    </el-card>
                </el-col>
            </el-row>
            <el-row :gutter="20">
                <el-col :span="6" v-for="t in productArr">
                    <el-card style="margin-top: 20px">
                        <img :src="t.url" width="100%">
                        <div>
                            <p style="height: 40px;margin-top: 0;">{{ t.title }}</p>
                            <div style="color: #666">
                                <span>￥{{ t.price}}</span>
                                <s style="font-size: 12px;">{{ t.oldPrice }}</s>
                                <span style="float: right;">销量{{ t.saleCount }}</span>
                            </div>
                        </div>
                    </el-card>
                </el-col>
            </el-row>
        </el-main>
        <el-footer>
            <div style="background-image: url('./imgs/wave.png');height: 95px"></div>
            <div style="text-align: center;background: #333;padding: 20px;color: #ddd">
                <p>Copyright ©江苏万和系统工程有限公司版权所有 苏ICP备12003709号-3 苏公网安备11010802029572号</p>
                <p>涵盖20余门课程体系，致力于打造权威的IT职业教育学习平台</p>
                <p>万和在线WWW.WANHO.ORG 专注于IT职业技能培训</p>
            </div>
        </el-footer>
    </el-container>
</div>
</body>
